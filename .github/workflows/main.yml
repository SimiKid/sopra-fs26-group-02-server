name: Deploy Project to App Engine

on:
  push:
    branches:
      - main

  # run the workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  test:
    name: Test and Sonarqube
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Install Java 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Make gradlew executable
        run: chmod +x gradlew
      
      - name: Test and analyze
        run: ./gradlew test jacocoTestReport sonar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}

  deploy:
    name: Deploying to Google Cloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      # The API key is stored in GitHub Secrets and injected into the app.yaml file before deployment.
      - name: Inject API key into app.yaml
        run: |
          sed -i "s|OPENWEATHER_API_KEY: .*|OPENWEATHER_API_KEY: '${{ secrets.OPENWEATHER_API_KEY }}'|" app.yaml
          sed -i "s|CLOUD_SQL_INSTANCE_PLACEHOLDER|${{ secrets.CLOUD_SQL_INSTANCE }}|" app.yaml
          sed -i "s|DB_USER_PLACEHOLDER|${{ secrets.DB_USER }}|" app.yaml
          sed -i "s|DB_PASSWORD_PLACEHOLDER|${{ secrets.DB_PASSWORD }}|" app.yaml

      - name: Deploy to App Engine
        id: deploy
        uses: google-github-actions/deploy-appengine@v0.2.0
        with:
          deliverables: app.yaml
          credentials: ${{ secrets.GCP_SERVICE_CREDENTIALS }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Test
        run: curl "${{ steps.deploy.outputs.url }}"